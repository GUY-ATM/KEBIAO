		<script>
			// 从localStorage获取配色方案
			function getCoursePaletteFromStorage() {
				const courseStr = localStorage.getItem('course');
				if (courseStr) {
					try {
						return JSON.parse(courseStr);
					} catch (e) {
						console.error('解析配色方案失败:', e);
						return null;
					}
				}
				return null;
			}

			// 检查并直接应用配色方案，避免页面刷新
			function checkAndApplyColorScheme() {
				const currentPalette = getCoursePaletteFromStorage();
				const lastAppliedPalette = localStorage.getItem('lastAppliedPalette');

				if (currentPalette && lastAppliedPalette) {
					const lastApplied = JSON.parse(lastAppliedPalette);
					// 比较配色方案是否不同
					if (JSON.stringify(currentPalette) !== JSON.stringify(lastApplied)) {
						// 更新记录但不刷新页面
						localStorage.setItem('lastAppliedPalette', JSON.stringify(currentPalette));
						// 这里可以添加直接应用配色方案的代码（如果需要）
						return true;
					}
				} else if (currentPalette) {
					// 第一次应用配色方案
					localStorage.setItem('lastAppliedPalette', JSON.stringify(currentPalette));
				}
				return false;
			}

			// Tailwind CSS 配置
			const coursePalette = getCoursePaletteFromStorage();
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							primary: '#3B82F6', // 蓝色作为主色调
							secondary: '#EC4899', // 辅助色：粉色，用于强调和交互元素
							neutral: {
								100: '#F3F4F6',
								200: '#E5E7EB',
								300: '#D1D5DB',
								400: '#9CA3AF',
								500: '#6B7280',
								600: '#4B5563',
								700: '#374151',
								800: '#1F2937',
								900: '#111827',
							},
							course: coursePalette || {
								color1: '#66ccff', // 蓝色（比浅色版深，比原版浅）
								color2: '#66e0c0', // 绿色（平衡鲜艳度）
								color3: '#ff99cc', // 粉色（适中饱和度）
								color4: '#ccb3ff', // 紫色（柔和且清晰）
								color5: '#60A5FA', // 浅蓝色（与 color1 互补）
							}
						},
						fontFamily: {
							sans: ['Inter', 'system-ui', 'sans-serif'],
						},
						boxShadow: {
							'card': '0 4px 15px rgba(0, 0, 0, 0.32)',
							'card-hover': '0 8px 25px rgba(0, 0, 0, 0.42)',
							'modal': '0 10px 50px rgba(0, 0, 0, 0.15)',
						}
					},
				}
			}
		</script>
		<style type="text/tailwindcss">
			@layer utilities {

            font-size: var(--course-name-size) !important;

        /* 针对动态生成内容中的课程名称 */

        .table-text-control .course-cell .text-\[10px\],
        .table-text-control .course-cell span.text-\[10px\],
        .table-text-control .course-cell div.text-\[10px\] {

        }
            
            
            /* 红色文本类 */
            .text-red-500 {
                color: #ef4444; /* red-500 */
            }
            
            /* 课程详情模态框背景样式 */
            .modal-backdrop {
                @apply fixed inset-0 bg-black/50 z-50 flex justify-center items-center opacity-0 pointer-events-none;
                z-index: 98; /* 确保高于导航栏 */
                transition: opacity 500ms cubic-bezier(0.4, 0, 0.2, 1); /* 统一过渡时间和更平滑的曲线 */
                width: 100vw;
                height: 100vh;
            }
            
            /* 表格固定布局样式 */
            #excelViewContainer {
                table-layout: fixed !important;
                width: 100% !important;
            }
            
            #excelView th,
            #excelView td {
                width: 14.285% !important;
                min-width: 80px !important;
                max-width: 80px !important;
                overflow: hidden !important;
                box-sizing: border-box !important;
            }
            .modal-backdrop.active {
                @apply opacity-100 pointer-events-auto;
            }
            
            /* 课程详情卡片样式 - 简化版 */
            .modal-content {
                @apply rounded-3xl shadow-modal mx-4;
                background: #ffffff;
                width: 100%;
                max-width: 90vw; /* 最大宽度为视窗宽度的90% */
                position: relative;
                margin: 0 auto;
                transform: scale(0.95);
                opacity: 0;
				padding: 4px; /* 增加内边距，让内容有空间 */
                transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 100;
            }
            
            .modal-backdrop.active .modal-content {
                /* 显示状态：简单的缩放和淡入效果 */
                transform: scale(1);
                opacity: 1;
            }
            
            /* 关闭动画：简单的缩放和淡出效果 */
            .modal-backdrop.closing .modal-content {
                transform: scale(0.95);
                opacity: 0;
                transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
            }
            /* 自定义课程详情内容容器 - 屏幕中央显示 */
            #modalContent {
               /* 设置为固定定位，相对于屏幕定位 */
               position: fixed;
               /* 屏幕中央定位 */
               top: 50%;
               left: 50%;
               transform: translate(-50%, -50%);
               /* 确保z-index足够高，在其他元素之上 */
               background: #ffffff;
               width: 100%;
               max-width: 90vw; /* 最大宽度为视窗宽度的90% */
               margin: 0;
               border-radius: 30px;
               /* 如果需要调整高度，取消下面的注释并设置合适的值 */
               /* min-height: 400px; */
               /* 过渡效果，使位置变化更平滑 */
               transition: all 300ms ease;
}
            
            /* 关闭按钮点击反馈动画 */
            .close-btn {
                transition: transform 150ms ease;
            }
            .close-btn:active {
                transform: scale(0.95);
            }


            /* 日期滑轨样式 */
            .date-item {
                @apply flex flex-col items-center w-12 px-2 py-2 transition-all duration-200 cursor-pointer rounded-[10px] min-w-[48px] shadow-sm border border-white/20;
                background: rgba(255, 255, 255, 0.2);
            }
            
            /* 日期滑轨容器样式 - 隐藏超出边框部分 */
            #dateScrollContainer {
                overflow-x: auto;
                overflow-y: visible;
                border-radius: 34px;
                padding-top: 3px;
                padding-bottom: 0px;
            }
			/* 日期滑轨容器样悬停状态的样式*/
            .date-item:hover {
                @apply shadow-md transform -translate-y-2 border-white/40;
                background: rgba(255, 255, 255, 0.15);
            }
            .date-item.today {
                @apply text-primary font-bold shadow-md border-primary/40;
                background: rgba(59, 130, 246, 0.15);
            }
            .date-item.selected {
                @apply text-white font-bold shadow-lg border-primary/60;
                background: rgba(59, 130, 246, 0.8);
            }
            
            /* 临时选中状态（滑动过程中的动画效果）*/
            .date-item.temp-selected {
                @apply text-white font-bold shadow-lg border-primary/60;
                background: rgba(59, 130, 246, 0.8);
                transform: translateY(-15px); /* 上移15px，增加高度 */
                transition: all 0.5s ease; /* 动画时间增加到0.5s，减慢速度 */
            }
            .date-day {
                @apply text-xs mb-1;
            }
            .date-number {
                @apply text-sm font-medium;
            }
            
            /* 背景视频样式 */
            .bg-video {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                z-index: -1;
                filter: brightness(1);
                object-position: var(--video-position, center); /* 支持自定义水平位置 */
            }
            
            .atom-spinner {
                height: 130px;
                width: 130px;
                overflow: hidden;
                position: relative;
            }
            
            .atom-spinner .spinner-inner {
                position: relative;
                display: block;
                height: 100%;
                width: 100%;
                transform-style: preserve-3d;
            }
            
            /* 用CSS圆形替代特殊字符，解决Chrome显示问题 */
            .atom-spinner .spinner-circle {
                display: block;
                position: absolute;
                width: calc(130px * 0.15);
                height: calc(130px * 0.15);
                background-color: #ff1d5e;
                border-radius: 50%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
            
            .atom-spinner .spinner-line {
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: 50%;
                border-left-width: calc(130px / 25);
                border-top-width: calc(130px / 25);
                border-left-color: #ff1d5e;
                border-left-style: solid;
                border-top-style: solid;
                border-top-color: transparent;
                transform-origin: center;
            }
            
            .atom-spinner .spinner-line:nth-child(1) {
                animation: atom-spinner-animation-1 1s linear infinite;
                transform: rotateZ(120deg) rotateX(66deg) rotateZ(0deg);
            }
            
            .atom-spinner .spinner-line:nth-child(2) {
                animation: atom-spinner-animation-2 1s linear infinite;
                transform: rotateZ(240deg) rotateX(66deg) rotateZ(0deg);
            }
            
            .atom-spinner .spinner-line:nth-child(3) {
                animation: atom-spinner-animation-3 1s linear infinite;
                transform: rotateZ(360deg) rotateX(66deg) rotateZ(0deg);
            }
			/* loginStatus错误信息缩放动画效果 */
            @keyframes statusErrorScale {
                0% { transform: scale(1); }
                50% { transform: scale(1.05); }
                100% { transform: scale(1); }
           }

           #loginStatus.error-shake {
                animation: statusErrorScale 0.3s ease-in-out;
           }
            
            @keyframes atom-spinner-animation-1 {
                100% {
                    transform: rotateZ(120deg) rotateX(66deg) rotateZ(360deg);
                }
            }
            
            @keyframes atom-spinner-animation-2 {
                100% {
                    transform: rotateZ(240deg) rotateX(66deg) rotateZ(360deg);
                }
            }
            
            @keyframes atom-spinner-animation-3 {
                100% {
                    transform: rotateZ(360deg) rotateX(66deg) rotateZ(360deg);
                }
            }
			 /* 1. 隐藏原生复选框，保留点击交互 */

			  }
			
			  /* 3. 选择状态：白色勾号（与蓝色背景对比，更清晰） */
			  .custom-blue-checkbox:checked::after {
			    content: "✓"; /* 勾选符号 */

			    color: white; /* 勾号白色，突出显示 */

			    top: 50%; /* 垂直居中 */
			    left: 50%; /* 水平居中 */
			    transform: translate(-50%, -50%); /* 精准居中 */
			  }
			  /* 导入教务系统按钮点击缩放缩放效果类 */
			  .btn-scale {
			    transition: transform 0.2s ease; /* 过渡动画：0.2秒平滑缩放 */
			  }
			  
			  /* 点击时的缩放状态 */
			  .btn-scale:active {
			    transform: scale(0.9); /* 缩小至原尺寸的90%，使效果更明显 */
			  }
			  
			  /* 移除鼠标悬停时的放大效果 */
        }
    </style>

		<style>
			/* 关键样式：确保加载指示器始终可见 */
			#loadingIndicator {
				position: fixed !important;
				top: 0 !important;
				left: 0 !important;
				right: 0 !important;
				bottom: 0 !important;
				background: #ffffff !important;
				z-index: 9999 !important;
				display: flex !important;
				align-items: center !important;
				justify-content: center !important;
				opacity: 1 !important;
				visibility: visible !important;
			}

			#loadingIndicator.hidden {
				opacity: 0 !important;
				visibility: hidden !important;
				pointer-events: none !important;
				transition: opacity 0.3s ease, visibility 0.3s ease !important;
			}

			/* 简化的页面加载样式 */
			body.page-loading {
				overflow: hidden;
			}

			body.page-loaded {
				overflow: auto;
			}

			/* 确保加载完成后所有元素都正常显示 */
			body.page-loaded *:not(.message-overlay):not(h1):not(.text-neutral) {

				pointer-events: auto !important;
			}
		</style>

		<script>
			// 全局变量
			let courseData = {}; // 课程数据
			let currentWeek = 0; // 当前周次
			let selectedDate = null; // 当前选中的日期
			let animationFrameId = null; // 用于存储动画帧ID，以便可以取消动画
			// 从localStorage加载保存的开学日期，如果没有则使用默认值
			let startDate = (() => {
				const savedStartDate = localStorage.getItem('startDate');
				if (savedStartDate) {
					let date = new Date(savedStartDate);
					// 将开学日期调整为该周的周一
					const dayOfWeek = date.getDay();
					const daysToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
					date.setDate(date.getDate() + daysToMonday);
					return date;
				}
				return new Date(2025, 8, 8); // 默认开学日期（2025年9月8日，周一）
			})();
			let dates = []; // 所有日期数据
			let touchStartX = 0;
			let touchEndX = 0;
			let lastSwipeTime = 0; // 上次滑动时间，用于防抖
			
			// 滑动动画队列管理
			let animationQueue = []; // 存储待执行的动画任务
			let isAnimationProcessing = false; // 标记是否有动画正在处理中

			// 从localStorage加载课程数据
			function loadCourseData() {
				try {
					const storedData = localStorage.getItem('courseData');
					if (storedData) {
						courseData = JSON.parse(storedData);
						console.log('从localStorage加载课程数据成功');
					} else {
						console.warn('localStorage中没有课程数据');
						courseData = {};
					}
				} catch (error) {
					console.error('加载课程数据失败:', error);
					courseData = {};
				}
			}

			// 保存课程数据到localStorage
			function saveCourseData(data) {
				try {
					courseData = data;
					localStorage.setItem('courseData', JSON.stringify(data));
					console.log('课程数据已保存到localStorage');
				} catch (error) {
					console.error('保存课程数据失败:', error);
				}
			}

			// 获取指定日期是开学第几周
			function getWeekNumber(date) {
				const diffTime = date.getTime() - startDate.getTime();
				const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
				const weekNumber = Math.floor(diffDays / 7) + 1;
				console.log('计算周数:', {
					date: date.toISOString().split('T')[0],
					startDate: startDate.toISOString().split('T')[0],
					diffDays: diffDays,
					weekNumber: weekNumber
				});
				return weekNumber;
			}

			// 获取指定周的开始日期（周一）
			function getWeekStartDate(weekNumber) {
				const weekStartDate = new Date(startDate);
				weekStartDate.setDate(startDate.getDate() + (weekNumber - 1) * 7);
				console.log('获取周开始日期:', {
					weekNumber: weekNumber,
					startDate: startDate.toISOString().split('T')[0],
					weekStartDate: weekStartDate.toISOString().split('T')[0]
				});
				return weekStartDate;
			}

			// 生成日期数据
			function generateDates() {
				dates = [];
				const today = new Date();

				console.log('开始生成日期数据，开学日期:', startDate.toISOString().split('T')[0]);

				// 生成20周的日期数据
				for (let week = 1; week <= 20; week++) {
					const weekStart = getWeekStartDate(week);
					for (let day = 0; day < 7; day++) {
						const currentDate = new Date(weekStart);
						currentDate.setDate(weekStart.getDate() + day);

						const dayOfWeek = currentDate.getDay();
						const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
						const weekDayText = weekDays[dayOfWeek];

						const isToday = currentDate.getDate() === today.getDate() &&
							currentDate.getMonth() === today.getMonth() &&
							currentDate.getFullYear() === today.getFullYear();

						dates.push({
							date: new Date(currentDate),
							weekNumber: week,
							dayOfWeek: dayOfWeek,
							weekDayText: weekDayText,
							isToday: isToday,
							dateString: `${currentDate.getMonth() + 1}/${currentDate.getDate()}`
						});
					}
				}

				console.log('日期数据生成完成，共', dates.length, '天');
				console.log('第一周第一天:', dates[0].date.toISOString().split('T')[0], '周', dates[0].weekDayText);
				console.log('第二周第一天:', dates[7].date.toISOString().split('T')[0], '周', dates[7].weekDayText);

				// 设置初始选中日期
				if (!selectedDate) {
					const todayDate = dates.find(d => d.isToday);
					selectedDate = todayDate ? todayDate.date : dates[0].date;
					currentWeek = getWeekNumber(selectedDate);
				}
			}

			// 渲染日期滑轨
			function renderDateSlider(autoScroll = true) {
				const dateContainer = document.getElementById('dateContainer');
				const loadingSkeleton = document.getElementById('dateLoadingSkeleton');

				// 清空容器内容
				dateContainer.innerHTML = '';

				dates.forEach((dateInfo, index) => {
					const dateItem = document.createElement('div');
					let className = 'date-item';

					if (dateInfo.isToday) {
						className += ' today';
					}

					if (selectedDate && dateInfo.date.getTime() === selectedDate.getTime()) {
						className += ' selected';
					}

					dateItem.className = className;
					dateItem.setAttribute('data-index', index);

					// 判断是否为该周的周一或周日，如果是则显示周次
					const isFirstDayOfWeek = dateInfo.dayOfWeek === 1; // 周一
					const isLastDayOfWeek = dateInfo.dayOfWeek === 0; // 周日
					const shouldShowWeekNumber = isFirstDayOfWeek || isLastDayOfWeek;
					const dayDisplay = shouldShowWeekNumber ? `${dateInfo.weekNumber}周` : `周${dateInfo.weekDayText}`;
					
					dateItem.innerHTML = `
                    <span class="date-day">${dayDisplay}</span>
                    <span class="date-number">${dateInfo.dateString}</span>
                `;

					// 添加点击事件
					dateItem.addEventListener('click', () => {
						selectDate(dateInfo.date);
					});

					dateContainer.appendChild(dateItem);
				});

				// 移除加载骨架屏
				if (loadingSkeleton) {
					loadingSkeleton.remove();
				}

				// 滚动到当前选中的日期（仅在需要时）
				if (autoScroll) {
					scrollToSelectedDate();
				}
			}

			// 滚动到选中的日期
			function scrollToSelectedDate() {
				setTimeout(() => {
					const selectedElement = document.querySelector('.date-item.selected');
					if (selectedElement) {
						// 使用自定义的贝塞尔曲线动画效果替代默认的平滑滚动
						customScrollToElement(selectedElement);
					}
				}, 100);
			}

			// 自定义滚动函数，实现先快后慢的贝塞尔曲线动画效果
			function customScrollToElement(element) {
				// 将动画任务添加到队列中
				animationQueue.push({
					element: element,
					timestamp: Date.now()
				});
				
				// 处理动画队列
				processAnimationQueue();
			}
			
			// 处理动画队列
			function processAnimationQueue() {
				// 如果已经有动画在处理中，或者队列为空，则直接返回
				if (isAnimationProcessing || animationQueue.length === 0) {
					return;
				}
				
				// 标记正在处理动画
				isAnimationProcessing = true;
				
				// 取出最新的动画任务（忽略旧的任务）
				const latestTask = animationQueue.pop();
				
				// 清空队列中剩余的旧任务
				animationQueue = [];
				
				// 执行最新的动画任务
				executeScrollAnimation(latestTask.element);
			}
			
			// 执行滚动动画
			function executeScrollAnimation(element) {
				const container = document.getElementById('dateScrollContainer');
				if (!container) {
					// 动画处理完成
					isAnimationProcessing = false;
					return;
				}

				const containerRect = container.getBoundingClientRect();
				const elementRect = element.getBoundingClientRect();

				// 计算需要滚动的距离
				const targetScroll = container.scrollLeft + (elementRect.left - containerRect.left) - (containerRect.width / 2) +
					(elementRect.width / 2);

				// 获取当前滚动位置
				const startScroll = container.scrollLeft;
				const distance = targetScroll - startScroll;

				// 如果距离很短，直接滚动
				if (Math.abs(distance) < 2) {
					container.scrollLeft = targetScroll;
					// 动画处理完成
					isAnimationProcessing = false;
					return;
				}

				// 根据距离动态调整动画持续时间，提高快速滑动的响应性
				let duration;
				const absDistance = Math.abs(distance);
				if (absDistance > 1000) {
					// 距离很长，使用较长动画时间
					duration = 1600;
				} else if (absDistance > 500) {
					// 距离中等，使用中等动画时间
					duration = 1200;
				} else {
					// 距离较短，使用较短动画时间
					duration = 800;
				}
				
				const startTime = performance.now();

				// 贝塞尔曲线缓动函数：先快后慢 (easeOutQuart)
				function easeOutQuart(t) {
					return 1 - Math.pow(1 - t, 4);
				}

				// 获取所有日期元素
				const dateItems = document.querySelectorAll('.date-item');
				
				// 判断当前是否为表格视图
				const isListView = !document.getElementById('listViewContainer').classList.contains('hidden');
				
				// 取消之前的动画（如果存在）
				if (animationFrameId) {
					cancelAnimationFrame(animationFrameId);
					animationFrameId = null;
				}
				
				// 动画函数
				function animate(currentTime) {
					const elapsed = currentTime - startTime;
					const progress = Math.min(elapsed / duration, 1);

					// 使用贝塞尔曲线缓动函数计算当前位置
					const easedProgress = easeOutQuart(progress);
					const currentScroll = startScroll + (distance * easedProgress);

					container.scrollLeft = currentScroll;

					// 只在表格视图中，在动画结束前400ms标记居中的日期为选中状态
					if (!isListView && progress >= 0.75) { // 0.75 ≈ (1600-400)/1600
						// 查找当前居中的日期元素
						const containerCenter = container.scrollLeft + containerRect.width / 2;
						let closestElement = null;
						let minDistance = Infinity;
						
						dateItems.forEach(item => {
							const itemRect = item.getBoundingClientRect();
							const itemCenter = container.scrollLeft + itemRect.left + itemRect.width / 2;
							const distanceToCenter = Math.abs(itemCenter - containerCenter);
							
							if (distanceToCenter < minDistance) {
								minDistance = distanceToCenter;
								closestElement = item;
							}
						});
						
						// 标记居中的日期为选中状态
						if (closestElement && !closestElement.classList.contains('temp-selected')) {
							// 移除其他日期的临时选中状态
							dateItems.forEach(item => {
								item.classList.remove('temp-selected');
							});
							
							// 添加临时选中状态到居中的日期
							closestElement.classList.add('temp-selected');
						}
					}

					// 如果动画未完成，继续执行
					if (progress < 1) {
						animationFrameId = requestAnimationFrame(animate);
					} else {
						// 动画完成后清除动画帧ID
						animationFrameId = null;
						// 动画处理完成
						isAnimationProcessing = false;
						// 检查是否有新的动画任务需要处理
						processAnimationQueue();
					}
				}

				// 启动动画
				animationFrameId = requestAnimationFrame(animate);
			}

			// 滚动到新选中的日期并居中显示
			function scrollToNewSelectedDate(date) {
				const dateItems = document.querySelectorAll('.date-item');
				let targetElement = null;
				
				// 格式化日期为 "MM.DD" 格式进行比较
				const formattedDate = (date.getMonth() + 1) + '.' + date.getDate();
				
				// 查找对应的日期元素
				for (let item of dateItems) {
					const dateNumberElement = item.querySelector('.date-number');
					if (dateNumberElement) {
						const dateText = dateNumberElement.textContent.trim();
						if (dateText === formattedDate) {
							targetElement = item;
							break;
						}
					}
				}
				
				// 如果找到目标日期元素，则滚动到该位置并居中
				if (targetElement) {
					console.log('Scrolling to date:', formattedDate);
					customScrollToElement(targetElement); // 使用现有的滚动函数
				} else {
					console.log('Date element not found for:', formattedDate);
					// 如果通过格式化日期找不到，尝试通过日期对象比较
					const allDateItems = document.querySelectorAll('.date-item');
					for (let item of allDateItems) {
						const index = parseInt(item.getAttribute('data-index'));
						if (index !== null && index !== undefined && dates[index]) {
							const itemDate = dates[index].date;
							if (itemDate.getTime() === date.getTime()) {
								targetElement = item;
								break;
							}
						}
					}
					
					if (targetElement) {
						console.log('Found date element by date object comparison');
						customScrollToElement(targetElement);
					}
				}
			}

			// 处理触摸开始事件
			function handleTouchStart(e) {
				console.log('Touch start event triggered');
				// 不清除已选中日期的上移效果，只在需要时清除临时选中状态
				document.querySelectorAll('.date-item.temp-selected').forEach(item => {

				if (animationFrameId) {
					cancelAnimationFrame(animationFrameId);
					animationFrameId = null;
				}
				
				// 清空动画队列
				animationQueue = [];
				isAnimationProcessing = false;
				
				touchStartX = e.touches[0].clientX;
				touchStartY = e.touches[0].clientY; // 记录起始Y坐标
			}

			// 处理触摸结束事件
			function handleTouchEnd(e) {
				console.log('Touch end event triggered');
				touchEndX = e.changedTouches[0].clientX;
				touchEndY = e.changedTouches[0].clientY; // 记录结束Y坐标
				handleSwipe(e);
			}

			// 处理鼠标按下事件
			function handleMouseDown(e) {
				console.log('Mouse down event triggered');
				// 不清除已选中日期的上移效果，只在需要时清除临时选中状态
				document.querySelectorAll('.date-item.temp-selected').forEach(item => {
					item.style.transform = ''; // 只清除临时选中状态
					item.classList.remove('temp-selected');
				});

				if (animationFrameId) {
					cancelAnimationFrame(animationFrameId);
					animationFrameId = null;
				}
				
				// 清空动画队列
				animationQueue = [];
				isAnimationProcessing = false;
				
				touchStartX = e.clientX;
				touchStartY = e.clientY; // 记录起始Y坐标
				// 添加鼠标移动和释放事件监听器
				document.addEventListener('mousemove', handleMouseMove);
				document.addEventListener('mouseup', handleMouseUp);
			}

			// 处理鼠标移动事件
			function handleMouseMove(e) {
				// 在鼠标拖动过程中不执行任何操作，只记录最终位置
				touchEndX = e.clientX;
				touchEndY = e.clientY; // 记录结束Y坐标
			}

			// 处理鼠标释放事件
			function handleMouseUp(e) {
				console.log('Mouse up event triggered');
				// 移除事件监听器
				document.removeEventListener('mousemove', handleMouseMove);
				document.removeEventListener('mouseup', handleMouseUp);

				// 调用滑动处理函数
				handleSwipe(e);
			}

			// 处理滑动
			function handleSwipe(e) {
				console.log('Handle swipe function called');
				// 阻止事件冒泡
				if (e) {
					e.stopPropagation();
				}

				const swipeThreshold = 30; // 降低滑动阈值，提高灵敏度
				const diffX = touchEndX - touchStartX; // 水平滑动距离
				const diffY = touchEndY - touchStartY; // 垂直滑动距离
				console.log('Swipe diff X:', diffX, 'Swipe diff Y:', diffY);

				// 防抖处理：优化快速连续滑动的处理
				const now = Date.now();
				const timeDiff = now - lastSwipeTime;
				
				// 根据滑动速度动态调整防抖时间，提高快速滑动的响应性
				const swipeSpeed = Math.abs(diffX) / timeDiff; // 像素/ms
				let debounceThreshold;
				
				if (swipeSpeed > 1.0) {
					// 高速滑动，极短防抖时间
					debounceThreshold = 50;
				} else if (swipeSpeed > 0.5) {
					// 中速滑动，较短防抖时间
					debounceThreshold = 100;
				} else {
					// 低速滑动，正常防抖时间
					debounceThreshold = 200;
				}
				
				if (timeDiff < debounceThreshold) {
					console.log('Swipe blocked by debounce, time diff:', timeDiff, 'threshold:', debounceThreshold);
					return;
				}
				lastSwipeTime = now;

				// 判断是水平滑动还是垂直滑动（水平滑动优先）
				if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > swipeThreshold) {
					console.log('Horizontal swipe detected');
					
					// 检查是否在考试信息视图或成绩信息视图中
					if (window.isExamView || window.isGradeView) {
						// 在考试信息视图中，左右滑动切换到成绩信息视图
						if (window.isExamView) {
							console.log('Swiping from exam view to grade view');
							showGradeInfo();
							return;
						}
						
						// 在成绩信息视图中，左右滑动切换到考试信息视图
						if (window.isGradeView) {
							console.log('Swiping from grade view to exam view');
							showExamInfo();
							return;
						}
					}
					
					// 判断当前是列表视图还是表格视图
					const isListView = !document.getElementById('listViewContainer').classList.contains('hidden');
					console.log('Is list view:', isListView);

					if (isListView) {
						// 列表视图：左右滑动切换日期
						// 右滑动(-1)是前一天，左滑动(1)是后一天（符合用户习惯）
						const direction = diffX > 0 ? -1 : 1;
						console.log('Switching date with direction:', direction);
						switchToDate(direction);
					} else {
						// 表格视图：左右滑动切换周次
						// 右滑动(-1)是上周，左滑动(1)是下周（符合用户习惯）
						const direction = diffX > 0 ? -1 : 1;
						const newWeek = currentWeek + direction;
						console.log('Switching week to:', newWeek);

						// 限制周数在有效范围内（1-20周）
						if (newWeek >= 1 && newWeek <= 20) {
							switchToWeek(newWeek);
						}
					}
				} else if (Math.abs(diffY) > swipeThreshold) {
					console.log('Vertical swipe detected - scrolling only');
					// 垂直滑动只用于滚动，不触发周次切换
					// 这里不需要做任何事情，浏览器会自动处理滚动
				} else {
					console.log('Swipe threshold not met');
				}
			}

			// 切换到前一天或后一天（用于列表视图）
			function switchToDate(direction) {
				console.log('Switch to date called with direction:', direction);
				if (!selectedDate) return;

				// 创建新的日期对象
				const newDate = new Date(selectedDate);

				// 根据方向调整日期
				newDate.setDate(newDate.getDate() + direction);
				console.log('New date:', newDate);

				// 检查新日期是否在有效范围内（开学日期到第20周结束）
				const endDate = new Date(startDate);
				endDate.setDate(startDate.getDate() + 20 * 7 - 1); // 第20周的最后一天
				console.log('Start date:', startDate);
				console.log('End date:', endDate);

				if (newDate >= startDate && newDate <= endDate) {
					console.log('Date is within range, selecting date');
					
					// 只清除临时选中状态，保留真正的选定状态
					document.querySelectorAll('.date-item.temp-selected').forEach(item => {
						item.style.transform = ''; // 清除临时选中状态
						item.classList.remove('temp-selected');
					});
					
					// 添加滑动过程中的选中效果，保持持续状态
					showTemporarySelection(newDate);
					
					// 更新课程数据，但不恢复上移效果
					selectedDate = newDate;
					currentWeek = getWeekNumber(selectedDate);
					updateScheduleDisplay();
					
					// 同时开始滑轨滚动，确保与日期上移动画同步启动
					// 使用智能防抖优化，根据滑动频率调整延迟时间
					if (switchToDate.debounceTimer) {
						clearTimeout(switchToDate.debounceTimer);
					}
					
					// 根据滑动频率动态调整延迟时间，提高快速滑动的流畅性
					const now = Date.now();
					const timeSinceLastSwipe = now - lastSwipeTime;
					let scrollDelay;
					
					if (timeSinceLastSwipe < 100) {
						// 快速连续滑动，缩短延迟时间
						scrollDelay = 20;
					} else if (timeSinceLastSwipe < 200) {
						// 中等速度滑动，适中延迟时间
						scrollDelay = 35;
					} else {
						// 慢速滑动，较长延迟时间
						scrollDelay = 50;
					}
					
					// 延迟执行滚动，给用户更流畅的感觉
					switchToDate.debounceTimer = setTimeout(() => {
						scrollToNewSelectedDate(newDate);
						switchToDate.debounceTimer = null;
					}, scrollDelay);
				} else {
					console.log('Date is out of range');
				}
			}
			
			// 显示选中状态并保持持续的上移效果
			function showTemporarySelection(tempDate) {
				// 移除所有现有的选中状态和上移效果，为新日期让路
				document.querySelectorAll('.date-item').forEach(item => {
					item.classList.remove('selected', 'temp-selected');
					item.style.transform = ''; // 清除上移效果，为新日期让路
				});
				
				// 为目标日期添加选中状态和持续的上移效果
				const tempIndex = dates.findIndex(d => d.date.getTime() === tempDate.getTime());
				if (tempIndex >= 0) {
					const tempElement = document.querySelector(`[data-index="${tempIndex}"]`);
					if (tempElement) {
						tempElement.classList.add('selected');
						// 添加持续的上移效果
						tempElement.style.transform = 'translateY(-15px)';
						tempElement.style.transition = 'all 0.5s ease';
					}
				}
			}

			function getCourseCategory(courseName) {
				// 使用更稳定的哈希算法，确保分布均匀
				let hash = 0;
				const len = courseName.length;

				if (len === 0) return 'color1';

				// 改进哈希算法：使用DJB2变种，减少冲突并提升分布均匀性
				for (let i = 0; i < len; i++) {
					const charCode = courseName.charCodeAt(i);
					// 更平缓的哈希增长，避免极端值导致取余偏差
					hash = ((hash << 7) ^ charCode) + (hash >> 3);
					hash = hash & hash; // 保持32位整数特性，避免溢出异常
				}

				// 最终哈希值归一化处理：通过两次取余确保分布更均匀
				const positiveHash = (hash >>> 0); // 无符号32位整数
				// 先对一个较大的质数取余，再对5取余，减少分布偏差
				const normalized = (positiveHash % 9973) % 5;
				const colorIndex = normalized + 1; // 确保生成 1-5 的索引

				return `color${colorIndex}`;
			}

			// 根据节次获取对应的时间
			function getTimeByClassNumber(classNumber) {
				const timeInfo = timeMap.find(item => item.classNumber === classNumber);
				return timeInfo ? `${timeInfo.startTime}-${timeInfo.endTime}` : '';
			}

			// 根据节次范围获取对应的时间范围
			function getTimeRangeByTimeSlots(timeSlots) {
				if (!timeSlots || timeSlots.length === 0) return '';

				const parsedSlots = parseTimeSlots(timeSlots);
				if (parsedSlots.length === 0) return timeSlots;

				const firstSlot = parsedSlots[0];
				const lastSlot = parsedSlots[parsedSlots.length - 1];

				const firstTimeInfo = timeMap.find(item => item.classNumber === firstSlot);
				const lastTimeInfo = timeMap.find(item => item.classNumber === lastSlot);

				if (firstTimeInfo && lastTimeInfo) {
					return `${firstTimeInfo.startTime}-${lastTimeInfo.endTime}`;
				}
				return timeSlots;
			}

			// 解析节次范围（例如："1-2" -> [1, 2]）
			function parseTimeSlots(timeSlot) {
				const parts = timeSlot.split('-');
				if (parts.length === 2) {
					const start = parseInt(parts[0]);
					const end = parseInt(parts[1]);
					const slots = [];
					for (let i = start; i <= end; i++) {
						slots.push(i);
					}
					return slots;
				} else if (parts.length === 1) {
					return [parseInt(parts[0])];
				}
				return [];
			}

			// 获取星期几的索引（周一=0, 周二=1, ..., 周日=6）
			function getWeekdayIndex(weekday) {
				const weekdays = ['星期一', '星期二', '星期三', '星期四', '星期五', '星期六', '星期日'];
				return weekdays.indexOf(weekday);
			}

									// 1秒后自动关闭灵动岛
									setTimeout(() => {
										toggleIslandExpand();
									}, 500);
								}
							}, 200); // 阶段3延迟
							islandAnimationTimers.push(timer3);
						}, 50); // 阶段2延迟 - 缩短延迟使动画更流畅
						islandAnimationTimers.push(timer2);
					}, 0); // 阶段1立即开始
					islandAnimationTimers.push(timer1);
				} else {
					// 收起动画 - 采用更平缓的曲线避免视觉上的"突然消失"
					// 按钮容器渐显，按钮变为可点击
					if (navButtonsContainer) {
						navButtonsContainer.style.opacity = '1';
						// 启用所有按钮
						const buttons = navButtonsContainer.querySelectorAll('button');
						buttons.forEach(button => {
							button.disabled = false;
						});
					}

					// 应用更适合收缩的动画曲线 - 使用苹果风格的曲线
					islandContainer.style.transition = 'all 0.4s cubic-bezier(0.2, 0.1, 0.3, 1)';

					// 重置展开效果 - 调整延迟与收起动画过渡时间匹配
					let timer5 = setTimeout(() => {
						// 清除所有自定义样式，确保回到初始状态
						islandContainer.style.transition = '';
						islandContainer.style.transform = '';
						// 双重确保内容隐藏，防止任何显示问题
						islandContent.classList.remove('expanded-content');
						islandDefaultIcon.style.display = 'none'; // 隐藏默认图标

						// 移除上传区域的虚线边框高亮效果
						const uploadArea = document.getElementById('islandUploadArea');
						if (uploadArea) {
							uploadArea.style.borderColor = 'rgba(255,255,255,0.5)';
							uploadArea.innerHTML = '';
						}

						// 移除上传相关的事件监听器
						removeUploadEventListeners();

						// 移除expanded类
						islandContainer.classList.remove('expanded');
					}, 400); // 调整延迟时间，与收缩动画时长匹配
					islandAnimationTimers.push(timer5);
				}
			}

			// 设置上传相关的事件监听器
			function setupUploadEventListeners() {
				const uploadArea = document.getElementById('islandUploadArea');
				const fileInput = document.getElementById('islandFileInput');

				if (!uploadArea || !fileInput) return;

				// 移除之前可能存在的事件监听器
				uploadArea.removeEventListener('click', handleUploadAreaClick);
				uploadArea.removeEventListener('dragover', handleDragOver);
				uploadArea.removeEventListener('dragleave', handleDragLeave);
				uploadArea.removeEventListener('drop', handleDrop);
				fileInput.removeEventListener('change', handleFileChange);

				// 添加新的事件监听器
				uploadArea.addEventListener('click', handleUploadAreaClick);
				uploadArea.addEventListener('dragover', handleDragOver);
				uploadArea.addEventListener('dragleave', handleDragLeave);
				uploadArea.addEventListener('drop', handleDrop);
				fileInput.addEventListener('change', handleFileChange);
			}

			// 移除上传相关的事件监听器
			function removeUploadEventListeners() {
				const uploadArea = document.getElementById('islandUploadArea');
				const fileInput = document.getElementById('islandFileInput');

				if (!uploadArea || !fileInput) return;

				// 移除事件监听器
				uploadArea.removeEventListener('click', handleUploadAreaClick);
				uploadArea.removeEventListener('dragover', handleDragOver);
				uploadArea.removeEventListener('dragleave', handleDragLeave);
				uploadArea.removeEventListener('drop', handleDrop);
				fileInput.removeEventListener('change', handleFileChange);
			}

			// 处理上传区域点击事件（现在由视频更换逻辑处理）
			function handleUploadAreaClick(e) {
				// 阻止事件冒泡到灵动岛容器
				e.stopPropagation();

				// 此函数现在不执行任何操作，因为点击事件已由背景视频更换功能处理
			}

			// 处理拖拽悬停事件
			function handleDragOver(e) {
				e.preventDefault();
				e.stopPropagation();
				const uploadArea = document.getElementById('islandUploadArea');
				if (uploadArea) {
					uploadArea.style.borderColor = 'rgba(255,255,255,1)';
				}
			}

			// 处理拖拽离开事件
			function handleDragLeave(e) {
				e.stopPropagation();
				const uploadArea = document.getElementById('islandUploadArea');
				if (uploadArea) {
					uploadArea.style.borderColor = 'rgba(255,255,255,0.5)';
				}
			}

			// 处理文件拖放事件
			function handleDrop(e) {
				e.preventDefault();
				e.stopPropagation();
				const uploadArea = document.getElementById('islandUploadArea');
				if (uploadArea) {
					uploadArea.style.borderColor = 'rgba(255,255,255,0.5)';
				}

				if (e.dataTransfer.files.length > 0) {
					handleFileSelection(e.dataTransfer.files[0]);
				}
			}

			// 处理文件选择事件
			function handleFileChange(e) {
				e.stopPropagation();
				if (e.target.files.length > 0) {
					handleFileSelection(e.target.files[0]);
				}
			}

			// 处理文件选择
			function handleFileSelection(file) {
				// 验证文件类型
				if (file.type !== 'application/json' && !file.name.endsWith('.json')) {
					// 显示错误图标
					const islandUploadArea = document.getElementById('islandUploadArea');
					if (islandUploadArea) {
						islandUploadArea.innerHTML =
							'<i class="fa-solid fa-circle-xmark text-red-500" style="font-size: 8rem;"></i>';
						// 1秒后恢复为上传图标
						setTimeout(() => {
							islandUploadArea.innerHTML =
								'<i class="fa-solid fa-cloud-arrow-up text-blue-500" style="font-size: 8rem;"></i>';
							const fileInput = document.getElementById('islandFileInput');
							if (fileInput) {
								// 重置文件输入框，确保相同文件可以被重新上传
								fileInput.value = '';
								islandUploadArea.appendChild(fileInput);
								// 重新设置事件监听器
								setupUploadEventListeners();
							}
						}, 1000);
					}
					return;
				}

				selectedFile = file;

				// 读取文件内容
				const reader = new FileReader();
				reader.onload = (e) => {
					try {
						// 预解析文件内容验证格式
						fileContent = JSON.parse(e.target.result);

						// 自动上传文件
						handleUpload();
					} catch (error) {
						// 显示错误图标
						const islandUploadArea = document.getElementById('islandUploadArea');
						if (islandUploadArea) {
							islandUploadArea.innerHTML =
								'<i class="fa-solid fa-circle-xmark text-red-500" style="font-size: 8rem;"></i>';
							// 1秒后恢复为上传图标
							setTimeout(() => {
								islandUploadArea.innerHTML =
									'<i class="fa-solid fa-cloud-arrow-up text-blue-500" style="font-size: 8rem;"></i>';
								const fileInput = document.getElementById('islandFileInput');
								if (fileInput) {
									// 重置文件输入框，确保相同文件可以被重新上传
									fileInput.value = '';
									islandUploadArea.appendChild(fileInput);
									// 重新设置事件监听器
									setupUploadEventListeners();
								}
							}, 0);
						}
						selectedFile = null;
						fileContent = null;
					}
				};
				reader.readAsText(file);
			}

			// 处理上传按钮点击事件
			function handleUpload() {
				try {
					if (!selectedFile || !fileContent) {
						throw new Error('请先选择并上传有效的JSON文件');
					}

					// 验证JSON格式是否符合课程数据要求
					if (!validateCourseData(fileContent)) {
						throw new Error('JSON文件格式不符合课程数据要求');
					}

					// 检查文件内容是否包含"节次"字样
					const fileContentStr = JSON.stringify(fileContent);
					if (!fileContentStr.includes('节次')) {
						throw new Error('文件内容不包含课程节次信息');
					}

					// 保存到localStorage
					localStorage.setItem('courseData', JSON.stringify(fileContent));

					// 显示成功图标
					const islandUploadArea = document.getElementById('islandUploadArea');
					if (islandUploadArea) {
						islandUploadArea.innerHTML =
							'<i class="fa-solid fa-circle-check text-green-500" style="font-size: 8rem;"></i>';
					}

					// 1秒后自动收起灵动岛并刷新课程表
					setTimeout(() => {
						toggleIslandExpand();
						loadCourseData();
						updateScheduleDisplay();

						// 重置上传状态，确保下次打开导入按钮时显示上传图标
						setTimeout(() => {
							const islandUploadArea = document.getElementById('islandUploadArea');
							const fileInput = document.getElementById('islandFileInput');
							if (islandUploadArea && fileInput) {
								islandUploadArea.innerHTML =
									'<i class="fa-solid fa-cloud-arrow-up text-blue-500" style="font-size: 8rem;"></i>';
								// 重置文件输入框，确保相同文件可以被重新上传
								fileInput.value = '';
								islandUploadArea.appendChild(fileInput);
								// 重新设置事件监听器
								setupUploadEventListeners();
							}
						}, 500); // 稍延迟重置，确保灵动岛完全关闭
					}, 1000);

				} catch (error) {
					// 显示错误图标
					const islandUploadArea = document.getElementById('islandUploadArea');
					if (islandUploadArea) {
						islandUploadArea.innerHTML =
							'<i class="fa-solid fa-circle-xmark text-red-500" style="font-size: 8rem;"></i>';
						// 1秒后恢复为上传图标
						setTimeout(() => {
							islandUploadArea.innerHTML =
								'<i class="fa-solid fa-cloud-arrow-up text-blue-500" style="font-size: 8rem;"></i>';
							const fileInput = document.getElementById('islandFileInput');
							if (fileInput) {
								// 重置文件输入框，确保相同文件可以被重新上传
								fileInput.value = '';
								islandUploadArea.appendChild(fileInput);
								// 重新设置事件监听器
								setupUploadEventListeners();
							}
						}, 1000);
					}
					// 显示错误消息
					showUploadStatus(`数据注入失败：${error.message}`, 'error');
					selectedFile = null;
					fileContent = null;
				}
			}

			// 验证课程数据格式的辅助函数
			function validateCourseData(data) {
				// 检查是否为对象
				if (typeof data !== 'object' || data === null) {
					return false;
				}

				// 检查每个周次的数据
				for (const week in data) {
					// 检查周次是否为数字字符串
					if (isNaN(parseInt(week))) {
						continue; // 跳过非数字键
					}

					// 检查周次数据是否为数组
					if (!Array.isArray(data[week])) {
						return false;
					}

					// 检查每门课程的数据
					for (const course of data[week]) {
						// 检查必需字段
						if (!course.hasOwnProperty('课程名称') ||
							!course.hasOwnProperty('星期') ||
							!course.hasOwnProperty('节次') ||
							!course.hasOwnProperty('教师') ||
							!course.hasOwnProperty('场地')) {
							return false;
						}
					}
				}

				return true;
			}

			// 显示上传状态消息
			function showUploadStatus(message, type) {
				const statusElement = document.getElementById('uploadStatus');
				if (!statusElement) return;

				// 设置消息内容和样式
				statusElement.textContent = message;

				// 根据类型设置不同的样式
				if (type === 'error') {
					statusElement.style.color = '#ff4757'; // 红色
				} else {
					statusElement.style.color = '#2ed573'; // 绿色
				}

				// 显示状态消息
				statusElement.style.opacity = '1';

				// 如果是成功消息，3秒后隐藏
				if (type === 'success') {
					setTimeout(() => {
						statusElement.style.opacity = '0';
					}, 3000);
				}
			}

			// 计算课程数量的辅助函数
			function countCourses(data) {
				let count = 0;
				for (const week in data) {
					if (data.hasOwnProperty(week) && Array.isArray(data[week])) {
						count += data[week].length;
					}
				}
				return count;
			}

			// 清除所有灵动岛动画定时器的辅助函数
			function clearAllIslandTimers() {
				while (islandAnimationTimers.length > 0) {
					clearTimeout(islandAnimationTimers.pop());
				}
			}

			// 初始化函数
			function initializeSchedule() {
				try {
					// 加载课程数据
					loadCourseData();

					// 设置开学日期输入框的值（显示用户原始选择的日期）
					const userSelectedStartDate = localStorage.getItem('userSelectedStartDate');
					const startDateInput = document.getElementById('startDateInput');
					if (userSelectedStartDate && startDateInput) {
						startDateInput.value = userSelectedStartDate;
					}

					// 生成日期数据
					generateDates();

					// 渲染日期滑轨
					renderDateSlider(true);

					// 添加滑动事件
					addSwipeEvents();

					// 更新课程表显示
					updateScheduleDisplay();
				} catch (error) {
					console.error('初始化过程中出错:', error);
					// 即使出错，也继续移除加载状态
				}

				// 初始化完成，显示页面内容 - 确保无论如何都会执行
				setTimeout(() => {
					console.log('初始化完成，显示页面内容');

					const pageBody = document.getElementById('pageBody');
					const loadingIndicator = document.getElementById('loadingIndicator');

					// 移除加载状态，恢复正常显示
					if (pageBody) {
						pageBody.classList.remove('page-loading');
						pageBody.classList.add('page-loaded');
						// 确保正常滚动
						pageBody.style.overflow = 'auto';
					}

					// 移除加载指示器
					if (loadingIndicator) {
						loadingIndicator.classList.add('hidden');
						// 在动画结束后完全移除元素
						setTimeout(() => {
							if (loadingIndicator.parentNode) {
								loadingIndicator.parentNode.removeChild(loadingIndicator);
							}
						}, 300);
					}

					// 确保所有元素都正常显示
					document.body.style.filter = 'none';
					document.body.style.backdropFilter = 'none';

					// 确保背景视频可见
					const bgVideo = document.querySelector('.bg-video');
					if (bgVideo) {
						bgVideo.style.display = 'block';
						bgVideo.style.zIndex = '-1';
					}

					console.log('页面加载完成，所有功能正常');
				}, 300); // 缩短延迟时间以清除DOM更新完成
			}



			// 同步视频背景位置设置（优化版本）
			function syncVideoPosition() {
				// 使用requestAnimationFrame确保在浏览器下次重绘之前执行
				requestAnimationFrame(() => {
					const savedPosition = localStorage.getItem('videoPosition') || '50';
					const percentage = parseInt(savedPosition);
					let objectPosition = '';

					// 更精细的左侧调节区间，避免白边
					if (percentage <= 5) {
						objectPosition = '0% center';
					} else if (percentage <= 10) {
						objectPosition = '5% center';
					} else if (percentage <= 15) {
						objectPosition = '10% center';
					} else if (percentage <= 20) {
						objectPosition = '15% center';
					} else if (percentage <= 25) {
						objectPosition = '20% center';
					} else if (percentage <= 30) {
						objectPosition = '25% center';
					} else if (percentage <= 35) {
						objectPosition = '30% center';
					} else if (percentage <= 40) {
						objectPosition = '35% center';
					} else if (percentage <= 45) {
						objectPosition = '40% center';
					} else if (percentage <= 55) {
						objectPosition = 'center center';
					} else if (percentage <= 60) {
						objectPosition = '60% center';
					} else if (percentage <= 65) {
						objectPosition = '65% center';
					} else if (percentage <= 70) {
						objectPosition = '70% center';
					} else if (percentage <= 75) {
						objectPosition = '75% center';
					} else if (percentage <= 80) {
						objectPosition = '80% center';
					} else if (percentage <= 85) {
						objectPosition = '85% center';
					} else if (percentage <= 90) {
						objectPosition = '90% center';
					} else if (percentage <= 95) {
						objectPosition = '95% center';
					} else {
						objectPosition = '100% center';
					}

					// 同时更新CSS变量和直接设置样式以确保同步
					document.documentElement.style.setProperty('--video-position', objectPosition);
					const bgVideo = document.querySelector('.bg-video');

					}

			// 同步考试信息文字大小设置
			function syncExamInfoFontSize() {

		<!-- 背景视频更换功能 -->
		<script type="text/javascript">
			const STORAGE_KEY = 'saved_video_background_path';

			// 应用保存的背景视频位置和亮度
			function applySavedVideoPosition() {
				// 使用requestAnimationFrame确保在浏览器下次重绘之前执行
				requestAnimationFrame(() => {
					// 应用位置设置
					const savedPosition = localStorage.getItem('videoPosition') || '50';
					const percentage = parseInt(savedPosition);
					let objectPosition = '';

					// 更精细的调节逻辑，左侧区间划分更细
					if (percentage <= 2) {
						objectPosition = '0% center'; // 0-2% 保持最左侧
					} else if (percentage <= 5) {
						objectPosition = '2% center'; // 2-5% 微调
					} else if (percentage <= 8) {
						objectPosition = '4% center'; // 5-8% 微调
					} else if (percentage <= 11) {
						objectPosition = '6% center'; // 8-11% 微调
					} else if (percentage <= 14) {
						objectPosition = '8% center'; // 11-14% 微调
					} else if (percentage <= 17) {
						objectPosition = '10% center'; // 14-17% 微调
					} else if (percentage <= 20) {
						objectPosition = '12% center'; // 17-20% 微调
					} else if (percentage <= 25) {
						objectPosition = '15% center'; // 20-25% 调整
					} else if (percentage <= 30) {
						objectPosition = '20% center'; // 25-30% 调整
					} else if (percentage <= 35) {
						objectPosition = '25% center'; // 35-40% 调整
					} else if (percentage <= 40) {
						objectPosition = '30% center'; // 35-40% 调整
					} else if (percentage <= 45) {
						objectPosition = '35% center'; // 40-45% 调整
					} else if (percentage <= 55) {
						objectPosition = 'center center'; // 45-55% 居中
					} else if (percentage <= 60) {
						objectPosition = '60% center'; // 55-60% 调整
					} else if (percentage <= 65) {
						objectPosition = '65% center'; // 60-65% 调整
					} else if (percentage <= 70) {
						objectPosition = '70% center'; // 65-70% 调整
					} else if (percentage <= 75) {
						objectPosition = '75% center'; // 70-75% 调整
					} else if (percentage <= 80) {
						objectPosition = '80% center'; // 75-80% 调整
					} else if (percentage <= 85) {
						objectPosition = '85% center'; // 80-85% 调整
					} else if (percentage <= 90) {
						objectPosition = '90% center'; // 85-90% 调整
					} else if (percentage <= 95) {
						objectPosition = '95% center'; // 90-95% 调整
					} else {
						objectPosition = '100% center'; // 95-100% 最右侧
					}

					// 同时更新CSS变量和直接设置样式以确保同步
					document.documentElement.style.setProperty('--video-position', objectPosition);
					const bgVideo = document.querySelector('.bg-video');
					if (bgVideo) {
						bgVideo.style.objectPosition = objectPosition;
					}

					// 应用亮度设置
					const savedBrightness = localStorage.getItem('videoBrightness') || '100';
					const brightnessValue = parseInt(savedBrightness) / 100;
					if (bgVideo) {
						bgVideo.style.filter = `brightness(${brightnessValue})`;
					}

					// 应用播放速度设置
					const savedSpeed = localStorage.getItem('videoSpeed') || '100';
					const speedValue = parseInt(savedSpeed) / 100;
					if (bgVideo) {
						bgVideo.playbackRate = speedValue;
					}
				});
			}

			// 创建selectVideoBtn隐藏元素
			let selectBtn = document.getElementById('selectVideoBtn');
			if (!selectBtn) {
				selectBtn = document.createElement('div');
				selectBtn.id = 'selectVideoBtn';
				selectBtn.style.display = 'none';
				document.body.appendChild(selectBtn);
			}

			// 定义全局的setVideoBackground函数，确保在任何地方都能调用
			function setVideoBackground(url) {
				const bgVideo = document.querySelector('.bg-video');
				if (!bgVideo) {
					console.error('未找到背景视频元素');
					return;
				}

				bgVideo.pause();
				bgVideo.src = url;
				bgVideo.load();
				bgVideo.play().catch(() => {
					// 播放失败时清除无效记录
					if (window.plus) {
						plus.storage.removeItem(STORAGE_KEY);
					}
					console.error('视频播放失败');
				});

				// 设置完成后自动关闭灵动岛
				setTimeout(() => {
					toggleIslandExpand();
				}, 500);
			}

			// 提前为selectVideoBtn绑定点击事件，确保在导入按钮点击前就已经绑定
			selectBtn.addEventListener('click', function() {
				if (window.plus && plus.gallery) {
					console.log('selectVideoBtn被点击，调用plus.gallery.pick');
					plus.gallery.pick(function(path) {
						// 保存视频路径 
						plus.storage.setItem(STORAGE_KEY, path);
						// 设置视频背景 
						const localUrl = plus.io.convertLocalFileSystemURL(path);
						setVideoBackground(localUrl);

						// 选择完成后自动关闭灵动岛
						setTimeout(() => {
							toggleIslandExpand();
						}, 500);
					}, function() {
						// 取消选择时重置模式并关闭灵动岛
						currentMode = 'default';
						setTimeout(() => {
							toggleIslandExpand();
						}, 500);
					}, {
						filter: 'video',
						multiple: false
					});
				} else {
					console.log('plus环境不可用，等待plusready事件');
					// 如果plus环境不可用，延迟后重试
					setTimeout(() => {
						selectBtn.click();
					}, 100);
				}
			});

			document.addEventListener('plusready', function() {
				// 使用class选择器获取视频元素，因为没有id="bgVideo"的元素
				const bgVideo = document.querySelector('.bg-video');

				if (!bgVideo) {
					console.error('未找到背景视频元素');
					return;
				}

				// 加载已保存的视频 
				function loadSavedVideo() {
					const savedPath = plus.storage.getItem(STORAGE_KEY);
					if (savedPath) {
						const localUrl = plus.io.convertLocalFileSystemURL(savedPath);
						setVideoBackground(localUrl);
					} else {
						// 如果没有保存的视频路径，确保灵动岛处于关闭状态
						setTimeout(() => {
							const islandContainer = document.getElementById('islandContainer');
							if (islandContainer && islandContainer.classList.contains('expanded')) {
								toggleIslandExpand();
							}
						}, 500);
					}
				}

				// 启动时加载已保存的视频 
				loadSavedVideo();

				// 视频错误处理 
				bgVideo.addEventListener('error', function() {
					plus.storage.removeItem(STORAGE_KEY);
				});
			});
		</script>
	</body>

	// 带cookie的fetch封装
	async function fetchWithCookies(url, options = {}) {
		// 构建cookie字符串
		const cookieStr = Object.entries(sessionData.cookies)
			.map(([name, value]) => `${name}=${encodeURIComponent(value)}`)
			.join('; ');

		// 添加cookie到请求头
		const headers = {
			...options.headers,
			'Cookie': cookieStr,
		};

		const response = await fetch(url, {
			...options,
			headers,
			credentials: 'include'
		});

		// 解析并保存响应中的cookie
		const setCookieHeaders = response.headers.get('Set-Cookie');
		if (setCookieHeaders) {
			setCookieHeaders.split(',').forEach(cookie => {
				const parts = cookie.trim().split(';')[0].split('=');
				if (parts.length === 2) {
					const name = parts[0].trim();
					const value = parts[1].trim();
					sessionData.cookies[name] = value;
				}
			});
		}

		return response;
	}

	// 提取csrftoken
	function extractCsrfToken(html) {
		const parser = new DOMParser();
		const doc = parser.parseFromString(html, 'text/html');
		const csrfInput = doc.querySelector('input[name="csrftoken"]');

		if (!csrfInput) {
			console.log('未找到csrftoken输入字段');
			return null;
		}

		const csrfValue = csrfInput.value;
		console.log('提取到的csrftoken原始值:', csrfValue);

		// 处理csrftoken格式：可能包含逗号分隔的两个部分
		if (csrfValue.includes(',')) {
			const parts = csrfValue.split(',');
			console.log('csrftoken分割结果:', parts);
			// 返回第一个部分（带连字符的UUID格式）
			return parts[0].trim();
		}

		return csrfValue;
	}

	// RSA加密函数
	function encrypt(plain, n) {
		console.log('=== 开始加密流程 ===');
		console.log('原始明文:', plain);
		console.log('公钥modulus:', n);

		try {
			// 步骤1：处理n（Base64解码→十六进制字符串）
			console.log('步骤1: Base64解码公钥modulus');
			const nBytes = CryptoJS.enc.Base64.parse(n);
			console.log('解码后的nBytes:', nBytes);
			console.log('nBytes.sigBytes:', nBytes.sigBytes);

			// 1.2 转换为十六进制字符串
			console.log('步骤1.2: 转换为十六进制字符串');
			let nHex = '';
			for (let i = 0; i < nBytes.words.length; i++) {
				const word = nBytes.words[i];
				// 将32位字转换为8个十六进制字符（每个字节2个字符）
				nHex += ((word >>> 24) & 0xFF).toString(16).padStart(2, '0');
				nHex += ((word >>> 16) & 0xFF).toString(16).padStart(2, '0');
				nHex += ((word >>> 8) & 0xFF).toString(16).padStart(2, '0');
				nHex += (word & 0xFF).toString(16).padStart(2, '0');
			}

			// 移除可能的多余字符
			nHex = nHex.substring(0, nBytes.sigBytes * 2);
			console.log('转换后的nHex:', nHex);
			console.log('nHex长度:', nHex.length);

			// 步骤2：初始化RSA加密器并设置公钥参数
			console.log('步骤2: 初始化RSA加密器');
			const encryptor = new JSEncrypt();

			// 设置指数为65537
			const exponent = 65537;

			// 使用jsencrypt的setKey方法直接设置公钥参数
			const key = encryptor.getKey();
			if (key && key.setPublic) {
				key.setPublic(nHex, exponent.toString(16));
				console.log('公钥设置成功');
			} else {
				// 备用方法：构建PEM格式
				console.log('使用备用PEM方法');

				// 简单PEM格式构建
				const modulusBase64 = CryptoJS.enc.Base64.stringify(CryptoJS.enc.Hex.parse(nHex));
				const publicKeyPem = `-----BEGIN RSA PUBLIC KEY-----
MIIBCgKCAQEA${modulusBase64}
AQAB
-----END RSA PUBLIC KEY-----`;
				console.log('构建的PEM公钥:', publicKeyPem);

				const isLoaded = encryptor.setPublicKey(publicKeyPem);
				console.log('公钥加载结果:', isLoaded);

				if (!isLoaded) {
					throw new Error("公钥格式错误，无法加载");
				}
			}

			// 步骤3：RSA加密明文
			console.log('步骤3: RSA加密明文');
			const encrypted = encryptor.encrypt(plain);
			console.log('jsencrypt加密结果:', encrypted);

			if (!encrypted) {
				throw new Error("加密失败，明文可能过长或公钥无效");
			}

			// 步骤4：加密结果转换
			console.log('步骤4: 加密结果转换');

			// 4.1 将Base64结果转换为十六进制
			console.log('步骤4.1: Base64结果转换为十六进制');
			const encryptedBytes = CryptoJS.enc.Base64.parse(encrypted);
			console.log('加密字节数据:', encryptedBytes);

			let encryptedHex = '';
			for (let i = 0; i < encryptedBytes.words.length; i++) {
				const word = encryptedBytes.words[i];
				encryptedHex += ((word >>> 24) & 0xFF).toString(16).padStart(2, '0');
				encryptedHex += ((word >>> 16) & 0xFF).toString(16).padStart(2, '0');
				encryptedHex += ((word >>> 8) & 0xFF).toString(16).padStart(2, '0');
				encryptedHex += (word & 0xFF).toString(16).padStart(2, '0');
			}
			encryptedHex = encryptedHex.substring(0, encryptedBytes.sigBytes * 2);
			console.log('转换后的encryptedHex:', encryptedHex);
			console.log('encryptedHex长度:', encryptedHex.length);

			// 4.2 十六进制字符串转换为二进制数据
			console.log('步骤4.2: 十六进制转换为二进制');
			const hexBytes = CryptoJS.enc.Hex.parse(encryptedHex);
			console.log('hexBytes:', hexBytes);

			// 4.3 最终Base64编码
			console.log('步骤4.3: 最终Base64编码');
			const finalBase64 = CryptoJS.enc.Base64.stringify(hexBytes);
			console.log('最终加密结果:', finalBase64);
			console.log('最终结果长度:', finalBase64.length);

			console.log('=== 加密完成 ===');
			return finalBase64;
		} catch (e) {
			console.error(`Encryption error: ${e.message}`);
			console.error('加密错误堆栈:', e.stack);
			return null;
		}
	}

	// 解析周次范围
	function parseWeekRange(weekStr) {
		const weekList = [];
		if (!weekStr) return weekList;

		// 预处理
		let processed = weekStr.replace(/，/g, ',').replace(/\s/g, '').replace(/周/g, '');
		const rangeParts = processed.split(',');

		for (const part of rangeParts) {
			if (!part) continue;

			let isSingle = part.includes('(单)');
			let isDouble = part.includes('(双)');
			let purePart = part.replace('(单)', '').replace('(双)', '').trim();

			try {
				if (!purePart.includes('-')) {
					// 单周
					const week = parseInt(purePart);
					if (week >= 1 && week <= 20) {
						weekList.push(week);
					}
				} else {
					// 周次范围
					const [start, end] = purePart.split('-').map(Number);
					if (start > end || start < 1 || end > 20) continue;

					for (let week = start; week <= end; week++) {
						if (isSingle && week % 2 !== 1) continue;
						if (isDouble && week % 2 !== 0) continue;
						weekList.push(week);
					}
				}
			} catch (e) {
				console.error('解析周次错误:', e);
			}
		}

		// 去重并排序
		return [...new Set(weekList)].sort((a, b) => a - b);
	}

	// 按周次统计课程
	function statCoursesByWeek(courseList) {
		const weekStat = {};
		// 初始化1-20周
		for (let i = 1; i <= 20; i++) {
			weekStat[i] = [];
		}

		const weekdayOrder = ["星期一", "星期二", "星期三", "星期四", "星期五", "星期六", "星期日"];

		for (const course of courseList) {
			const courseWeeks = parseWeekRange(course.周次);
			if (!courseWeeks.length) continue;

			const simpleCourse = {
				"星期": course.星期,
				"课程名称": course.课程名称,
				"节次": course.节次,
				"教师": course.教师,
				"场地": course.场地
			};

			// 添加到对应周次，避免重复
			for (const week of courseWeeks) {
				const isDuplicate = weekStat[week].some(c =>
					c.星期 === simpleCourse.星期 &&
					c.课程名称 === simpleCourse.课程名称 &&
					c.节次 === simpleCourse.节次
				);

				if (!isDuplicate) {
					weekStat[week].push(simpleCourse);
				}
			}
		}

		// 排序：先按星期，再按节次
		for (const week in weekStat) {
			weekStat[week].sort((a, b) => {
				const weekDayOrderA = weekdayOrder.indexOf(a.星期);
				const weekDayOrderB = weekdayOrder.indexOf(b.星期);

				if (weekDayOrderA !== weekDayOrderB) {
					return weekDayOrderA - weekDayOrderB;
				}

				// 按节次排序
				const sectionA = parseInt(a.节次.split('-')[0]);
				const sectionB = parseInt(b.节次.split('-')[0]);
				return sectionA - sectionB;
			});
		}

		return weekStat;
	}

	// 获取详细成绩信息
	async function fetchGradeDetail(jxb_id, schoolYear, semester) {

		const postData = new URLSearchParams();
		postData.append('xnm', schoolYear);
		postData.append('xqm', mappedSemester);
		postData.append('queryModel.showCount', '5000');
		postData.append('jxb_id', jxb_id);

			xnm: schoolYear,
			xqm: mappedSemester,
			jxb_id: jxb_id
		});
		console.log('详细成绩信息请求体(URLSearchParams格式):', postData.toString());
		
		try {
			const response = await fetchWithCookies(detailUrl, {
				method: 'POST',
				mode: 'cors',
				headers: {
					'Accept': 'application/json',
					'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
					...sessionData.headers
				},
				body: postData.toString()
			});
			
			if (!response.ok) {
				throw new Error(`获取详细成绩失败: ${response.status}`);
			}
			
			// 检查响应内容类型
			const contentType = response.headers.get('content-type');
			const responseText = await response.text();
			
			// 如果返回的是HTML而不是JSON，说明可能未登录或会话过期
			if (contentType && contentType.includes('text/html')) {
				console.error('服务器返回HTML内容而非JSON:', responseText.substring(0, 200));
				throw new Error('会话已过期，请重新登录');
			}
			
			// 尝试解析JSON
			let detailJson;
			try {
				detailJson = JSON.parse(responseText);

			}
			return detailJson;
		} catch (error) {
			console.error('获取详细成绩错误:', error);
			return null;
		}
	}

	// 显示详细成绩信息
	async function showGradeDetail(jxb_id, category, element) {
		// 获取中部提示信息元素
		const centerMsg = element.querySelector('.grade-center-msg');
		
		// 显示加载状态
		centerMsg.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span class="text-sm font-medium">加载中...</span>';
		
		try {
			// 获取当前学年和学期信息
			const gradeDataStr = localStorage.getItem('jwxt_grade_info');
			let schoolYear = '';
			let semester = '';
			
			if (gradeDataStr) {
				const gradeData = JSON.parse(gradeDataStr);
				schoolYear = gradeData.schoolYear || '';
				semester = gradeData.semester || '';
			}
			
			if (!schoolYear || !semester) {
				centerMsg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> 缺少学年或学期信息';
				return;
			}
			
			// 获取详细成绩数据
			const detailData = await fetchGradeDetail(jxb_id, schoolYear, semester);
			
			if (!detailData || !detailData.items || detailData.items.length === 0) {
				centerMsg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> <span class="text-sm">token失效请重新登录获取</span>';
				return;
			}
			
			// 提取平时成绩和考试成绩
			let平时成绩 = '未找到';
			let考试成绩 = '未找到';
			let总评成绩 = '未找到';
			
			detailData.items.forEach(item => {
				if (item.xmblmc === '平时(40%)' && item.xmcj) {
					平时成绩 = item.xmcj;
				} else if (item.xmblmc === '期末(60%)' && item.xmcj) {
					考试成绩 = item.xmcj;
				} else if (item.xmblmc === '总评' && item.xmcj) {
					总评成绩 = item.xmcj;
				}
			});
			
			// 在中部显示详细成绩
			centerMsg.innerHTML = `<span class="text-sm">平时：${平时成绩} 期末：${考试成绩} 总评：${总评成绩}</span>`;
			centerMsg.classList.remove('opacity-70');
			
			// 移除点击事件
			element.removeAttribute('onclick');
			element.classList.remove('cursor-pointer', 'hover:opacity-90', 'transition-opacity');
			
			// 保存详细成绩到本地存储
			const gradeDetails = JSON.parse(localStorage.getItem('jwxt_grade_details') || '{}');
			gradeDetails[jxb_id] = {
				平时成绩:平时成绩,
				考试成绩:考试成绩,
				总评成绩:总评成绩,
				timestamp: new Date().toISOString()
			};
			localStorage.setItem('jwxt_grade_details', JSON.stringify(gradeDetails));
		} catch (error) {
			console.error('显示详细成绩错误:', error);
			centerMsg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> 获取详细成绩失败';
		}
	}

	// 处理网络登录和课表导入
	async function handleNetworkLogin() {
		const username = document.getElementById('loginUsername').value.trim();
		const password = document.getElementById('loginPassword').value.trim();
		const rememberPassword = document.getElementById('rememberPassword').checked;
		const schoolYear = document.getElementById('loginSchoolYear').value;
		const semester = document.getElementById('loginSemester').value;

		console.log('=== 开始登录流程 ===');
		console.log('用户名:', username);
		console.log('密码长度:', password.length);
		console.log('记住密码:', rememberPassword);
		console.log('学年:', schoolYear);
		console.log('学期:', semester);

		if (!username || !password) {
			showLoginStatus('请输入用户名和密码', true);
			return;
		}

		// 保存用户名到本地存储
		localStorage.setItem('jwxt_username', username);

		// 保存学年选择到本地存储
		localStorage.setItem('jwxt_school_year', schoolYear);

		// 保存学期选择到本地存储
		localStorage.setItem('jwxt_semester', semester);

		// 根据用户选择决定是否保存密码
		if (rememberPassword) {
			// 为了安全，我们保存密码的加密版本
			localStorage.setItem('jwxt_password', btoa(password)); // 使用base64编码保存
			localStorage.setItem('jwxt_remember', 'true');
		} else {
			// 如果用户不选择记住密码，清除已保存的密码
			localStorage.removeItem('jwxt_password');
			localStorage.setItem('jwxt_remember', 'false');
		}

		showLoginLoading('正在登录...');
		hideLoginStatus();

		try {
			// 1. 获取登录页面，获取csrftoken
			console.log('步骤1: 获取登录页面和csrftoken');
			const loginUrl = 'https://jwxt.fjjxu.edu.cn/jwglxt/xtgl/login_slogin.html';
			console.log('请求URL:', loginUrl);

			// 先访问一次页面获取cookie和可能的csrftoken
			const initialResponse = await fetchWithCookies(loginUrl, {
				method: 'GET',
				mode: 'cors'
			});

			console.log('初始页面响应状态:', initialResponse.status);

			if (!initialResponse.ok) {
				throw new Error(`获取登录页面失败: ${initialResponse.status}`);
			}

			const initialHtml = await initialResponse.text();
			console.log('初始页面HTML长度:', initialHtml.length);

			// 查找登录表单部分
			const formStart = initialHtml.indexOf('<form');
			const formEnd = initialHtml.indexOf('</form>', formStart);
			if (formStart !== -1 && formEnd !== -1) {
				const formHtml = initialHtml.substring(formStart, formEnd + 7);
				console.log('登录表单HTML:', formHtml);
			}

			// 尝试提取csrftoken
			sessionData.csrftoken = extractCsrfToken(initialHtml);

			if (!sessionData.csrftoken) {
				// 尝试其他可能的csrftoken字段名
				console.log('尝试查找其他可能的csrftoken字段...');
				sessionData.csrftoken = extractCsrfTokenAlternative(initialHtml);
			}

			console.log('获取到的csrftoken:', sessionData.csrftoken);

			// 如果仍然没有找到csrftoken，尝试从cookie中获取
			if (!sessionData.csrftoken) {
				console.log('尝试从cookie中获取csrftoken...');
				const cookies = sessionData.cookies;
				console.log('当前cookies:', cookies);

				// 查找包含csrf的cookie
				for (const [name, value] of Object.entries(cookies)) {
					if (name.toLowerCase().includes('csrf')) {
						sessionData.csrftoken = value;
						console.log('从cookie中找到csrftoken:', sessionData.csrftoken);
						break;
					}
				}
			}

			if (!sessionData.csrftoken) {
				// 如果仍然没有，使用默认值或空值继续尝试
				console.log('未找到csrftoken，使用空值继续尝试');
				sessionData.csrftoken = '';
			}

			// 2. 获取公钥
			console.log('步骤2: 获取RSA公钥');
			const pubkeyUrl = `https://jwxt.fjjxu.edu.cn/jwglxt/xtgl/login_getPublicKey.html?time=${Date.now()}`;
			console.log('公钥URL:', pubkeyUrl);

			const pubkeyResponse = await fetchWithCookies(pubkeyUrl, {
				method: 'GET',
				mode: 'cors',
				headers: {
					'Accept': 'application/json'
				}
			});

			console.log('公钥响应状态:', pubkeyResponse.status);

			if (!pubkeyResponse.ok) {
				throw new Error(`获取公钥失败: ${pubkeyResponse.status}`);
			}

			const pubkeyData = await pubkeyResponse.json();
			const modulus = pubkeyData.modulus;

			console.log('获取到的公钥modulus:', modulus);
			console.log('公钥modulus长度:', modulus ? modulus.length : 0);

			if (!modulus) {
				throw new Error('未获取到公钥modulus');
			}

			// 3. 加密密码
			console.log('步骤3: 加密密码');
			console.log('原始密码:', password);

			const encryptedPassword = encrypt(password, modulus);
			console.log('加密后的密码:', encryptedPassword);

			if (!encryptedPassword) {
				throw new Error('密码加密失败');
			}

			// 4. 提交登录请求
			console.log('步骤4: 提交登录请求');
			const formData = new URLSearchParams();
			formData.append('csrftoken', sessionData.csrftoken);
			// 使用教务系统期望的字段名
			formData.append('yhm', username); // 用户名字段
			formData.append('mm', encryptedPassword); // 密码字段

			console.log('登录请求数据:', {
				csrftoken: sessionData.csrftoken,
				yhm: username,
				mm: encryptedPassword
			});

			const loginResponse = await fetchWithCookies(loginUrl, {
				method: 'POST',
				mode: 'cors',
				headers: {
					'Content-Type': 'application/x-www-form-urlencoded',
					...sessionData.headers
				},
				body: formData.toString()
			});

			console.log('登录响应状态:', loginResponse.status);

			if (!loginResponse.ok) {
				throw new Error(`登录请求失败: ${loginResponse.status}`);
			}

			const loginResponseHtml = await loginResponse.text();
			console.log('登录响应内容长度:', loginResponseHtml.length);
			console.log('登录响应内容预览:', loginResponseHtml.substring(0, 500)); // 添加响应内容预览

			// 基于页面内容检测判断登录是否成功
			// 检查响应内容中是否包含登录失败的特定信息
			const isLoginFailed = loginResponseHtml.includes('用户名或密码不正确，请重新输入！') ||
				loginResponseHtml.includes('bg_danger sl_danger') ||
				loginResponseHtml.includes('glyphicon-minus-sign');

			console.log('是否登录失败:', isLoginFailed);

			// 如果登录失败，抛出错误并停止后续流程
			if (isLoginFailed) {
				console.error('登录失败: 响应内容包含错误信息');
				throw new Error('用户名或密码不正确，请重新输入！');
			}

			// 进一步检查是否仍在登录页面
			const isStillOnLoginPage = loginResponseHtml.includes('用户登录');
			if (isStillOnLoginPage) {
				console.error('登录失败: 仍在登录页面');
				throw new Error('登录失败，请检查用户名和密码');
			}

			console.log('登录成功!');

			// 登录成功，获取课程数据
			showLoginLoading('正在获取课程数据...');

			// 学期值映射：1 -> 3, 2 -> 12
			const semesterMap = {
				'1': '3',
				'2': '12'
			};
			const mappedSemester = semesterMap[semester] || semester;

			const kcUrl =
				`https://jwxt.fjjxu.edu.cn/jwglxt/kbcx/xskbcx_cxXsKb.html?gnmkdm=N2151&xnm=${schoolYear}&xqm=${mappedSemester}`;

			const courseResponse = await fetchWithCookies(kcUrl, {
				method: 'GET',
				mode: 'cors',
				headers: {
					'Accept': 'application/json',
					...sessionData.headers
				}
			});

			if (!courseResponse.ok) {
				throw new Error(`获取课程数据失败: ${courseResponse.status}`);
			}

			// 检查响应内容类型
			const courseContentType = courseResponse.headers.get('content-type');
			const courseResponseText = await courseResponse.text();
			
			// 如果返回的是HTML而不是JSON，说明可能未登录或会话过期
			if (courseContentType && courseContentType.includes('text/html')) {
				console.error('服务器返回HTML内容而非JSON:', courseResponseText.substring(0, 200));
				throw new Error('会话已过期，请重新登录');
			}
			
			// 尝试解析JSON
			let courseJson;
			try {
				courseJson = JSON.parse(courseResponseText);
			} catch (jsonError) {
				console.error('JSON解析失败，响应内容:', courseResponseText.substring(0, 200));
				throw new Error('服务器响应格式错误');
			}
			const kbList = courseJson.kbList || [];

			if (!kbList.length) {
				throw new Error('未找到课程数据');
			}

			// 解析课程数据
			const allCourses = parseCourseData(kbList);

			// 按周次统计课程
			const weekStats = statCoursesByWeek(allCourses);

			// 保存到localStorage
			// 修复：直接保存 weekStats 而不是包装在对象中
			localStorage.setItem('courseData', JSON.stringify(weekStats));

			// 保存周次统计数据到本地存储
			const statsData = {
				timestamp: new Date().toISOString(),
				schoolYear: schoolYear,
				semester: semester,
				weekStats: weekStats
			};

			localStorage.setItem('jwxt_week_stats', JSON.stringify(statsData));
			console.log('周次统计数据已保存到本地存储');

			// 获取考试信息
			const examInfo = await fetchExamInfo(schoolYear, semester);
			
			// 保存考试信息到localStorage
			const examData = {
				timestamp: new Date().toISOString(),
				schoolYear: schoolYear,
				semester: semester,
				examInfo: examInfo
			};
			localStorage.setItem('jwxt_exam_info', JSON.stringify(examData));
			console.log('考试信息已保存到本地存储:', examInfo);

			// 获取成绩信息
			const gradeInfo = await fetchGradeInfo(schoolYear, semester);
			
			// 保存成绩信息到localStorage
			const gradeData = {
				timestamp: new Date().toISOString(),
				schoolYear: schoolYear,
				semester: semester,
				gradeInfo: gradeInfo
			};
			localStorage.setItem('jwxt_grade_info', JSON.stringify(gradeData));
			console.log('成绩信息已保存到本地存储:', gradeInfo);

			showLoginStatus('课程数据导入成功', false);

			// 保存用户设置的开学日期到localStorage
			const startDateInput = document.getElementById('startDateInput');
			if (startDateInput) {
				const selectedStartDate = startDateInput.value;
				if (selectedStartDate) {
					let date = new Date(selectedStartDate);
					// 将开学日期调整为该周的周一
					const dayOfWeek = date.getDay();
					const daysToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
					date.setDate(date.getDate() + daysToMonday);
					
					// 保存原始用户选择的开学日期
					localStorage.setItem('userSelectedStartDate', selectedStartDate);
					// 保存调整后的周一日期用于计算
					localStorage.setItem('startDate', date.toISOString().split('T')[0]);
					// 同时更新全局的startDate变量
					startDate = date;
				}
			}

			// 关闭登录模态框
			setTimeout(() => {
				closeLoginModal();

				// 刷新课程表显示
				if (typeof initializeSchedule === 'function') {
					initializeSchedule();
				}

				// 显示成功提示
				if (typeof showDynamicIsland === 'function') {
					showDynamicIsland('数据导入成功');
				}

				// 关闭灵动岛
				if (typeof toggleIslandExpand === 'function') {
					setTimeout(() => {
						toggleIslandExpand();
					}, 500);
				}
			}, 1000);

		} catch (error) {
			console.error('登录错误:', error);
			console.error('错误堆栈:', error.stack);
			showLoginStatus(error.message || '登录失败，请重试', true);
		} finally {
			hideLoginLoading();
		}
	}
</script>

					const examCard = `
						<div class="course-card bg-course-${category} text-white border-l-4 border-course-${category}/80 relative overflow-hidden mb-4">
							<div class="absolute inset-0 bg-gradient-to-r from-course-${category} to-course-${category}/80"></div>
							<div class="relative z-10 p-4 h-32">
								<!-- 四个角落的信息 -->
								<div class="absolute top-3 left-3 exam-subject-container">
									<h3 class="font-semibold text-xl whitespace-nowrap">${(exam.kcmc || '未知科目').substring(0, 8)}</h3>
								</div>
								<div class="absolute top-3 right-3 text-right">
									<span class="text-lg font-medium whitespace-nowrap">${exam.kssj || '未安排'}</span>
								</div>
								<div class="absolute bottom-3 left-3 flex items-center">
									<i class="fas fa-graduation-cap mr-1"></i>
									<span>${exam.xf || '0'}学分</span>
								</div>
								<div class="absolute bottom-3 right-3 text-right">
									<span class="flex items-center"><i class="fas fa-map-marker-alt mr-1"></i>${exam.cdmc || '未安排'}</span>
								</div>
								<!-- 考试性质居中显示，纯文字无背景 -->
								<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
									<span class="text-sm font-medium text-white">${exam.sjbh || '未知'}</span>
								</div>
							</div>
						</div>
					`;
					
					htmlContent += examCard;
				});
			}
			
			// 将考试信息添加到列表容器中
			listContainer.innerHTML = htmlContent;
			
			// 切换到列表视图
			document.getElementById('listViewContainer').classList.remove('hidden');
			document.getElementById('excelViewContainer').classList.add('hidden');
			
			// 更新视图状态
			const viewToggleBtn = document.getElementById('viewToggleBtn');
			if (viewToggleBtn) {
				viewToggleBtn.innerHTML = '<i class="fa-solid fa-table-cells-large"></i><span>表格</span>';
			}
			
			// 不再绑定点击事件，使考试卡片不可点击
			
			// 添加滑动事件监听器，支持在考试信息和成绩信息之间切换
			addSwipeEvents();
			
			// 应用保存的课程名称和场地文字字体大小到考试信息
			syncExamInfoFontSize();
			
			// 添加一个标志，表示当前处于考试信息视图
			window.isExamView = true;
			// 确保不在成绩视图中
			window.isGradeView = false;
		} catch (error) {
			console.error('显示考试信息失败:', error);
			alert('显示考试信息失败，请重试');
		}
	}
	
	// 考试信息排序函数
	function sortExamInfo(examInfo) {
		// 过滤掉kssj为"未放开不可查"的考试信息
		const validExams = examInfo.filter(exam => exam.kssj && exam.kssj !== "未放开不可查");
		
		// 如果有效考试信息少于2个，则不进行排序，原样返回
		if (validExams.length < 2) {
			return examInfo;
		}
		
		// 对有效的考试信息按日期和时间排序
		validExams.sort((a, b) => {
			// 提取日期部分进行比较
			const dateA = a.kssj.split('(')[0]; // 获取括号前的日期部分
			const dateB = b.kssj.split('(')[0]; // 获取括号前的日期部分
			
			// 先按日期排序
			const dateComparison = new Date(dateA) - new Date(dateB);
			if (dateComparison !== 0) {
				return dateComparison;
			}
			
			// 如果日期相同，按时间段排序
			// 提取括号内的时间部分
			const timeA = a.kssj.match(/\((.*?)\)/);
			const timeB = b.kssj.match(/\((.*?)\)/);
			
			if (timeA && timeB) {
				// 获取开始时间进行比较（取括号内时间的前半部分，如08:20-10:00中的08:20）
				const startTimeA = timeA[1].split('-')[0];
				const startTimeB = timeB[1].split('-')[0];
				
				// 转换时间为分钟数进行比较
				const [hoursA, minutesA] = startTimeA.split(':').map(Number);
				const [hoursB, minutesB] = startTimeB.split(':').map(Number);
				const totalMinutesA = hoursA * 60 + minutesA;
				const totalMinutesB = hoursB * 60 + minutesB;
				
				return totalMinutesA - totalMinutesB;
			}
			
			return 0;
		});
		
		// 将无效的考试信息（kssj为"未放开不可查"）放在最后
		const invalidExams = examInfo.filter(exam => !exam.kssj || exam.kssj === "未放开不可查");
		
		// 合并排序后的有效考试信息和无效考试信息
		return [...validExams, ...invalidExams];
	}	
</script>
